<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula | Sistema de Economia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; }
        .btn-discord { background-color: #5865F2; transition: 0.3s; }
        .banner-perfil { background: linear-gradient(to bottom, #1e3a8a, #0b0e11); height: 180px; border-bottom: 1px solid #1e2329; }
        .hidden { display: none !important; }
        .badge-player { background-color: #1e2329; color: #7289da; border: 1px solid #2d333b; }
        .badge-guilda { background-color: #053b24; color: #10b981; }
    </style>
</head>
<body>

    <div id="tela-login" class="flex items-center justify-center h-screen hidden">
        <div class="card-bg p-10 rounded-2xl text-center shadow-2xl max-w-sm border-t-4 border-[#5865F2]">
            <h1 class="text-2xl font-bold mb-6">Nebula Economy</h1>
            <button onclick="fazerLogin()" class="btn-discord w-full py-4 rounded-lg font-bold flex items-center justify-center gap-3">
                <i class="fa-brands fa-discord text-xl"></i> VINCULAR DISCORD
            </button>
        </div>
    </div>

    <div id="tela-painel" class="hidden">
        <div class="banner-perfil relative">
            <div class="max-w-6xl mx-auto h-full relative">
                <div class="absolute -bottom-14 left-8 flex items-end gap-6">
                    <img id="user-avatar" src="" class="w-32 h-32 rounded-full border-4 border-[#0b0e11] shadow-2xl bg-[#151921]">
                    <div class="pb-4">
                        <div class="flex items-center gap-3">
                            <h1 id="user-name" class="text-3xl font-black italic text-white uppercase">Carregando...</h1>
                            <span class="badge-player px-2 py-0.5 rounded text-[10px] font-bold uppercase">Player</span>
                        </div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="badge-guilda px-2 py-0.5 rounded text-[10px] font-bold uppercase italic">Membro da Guilda</span>
                        </div>
                    </div>
                </div>
                <div id="area-adm-btn" class="absolute -bottom-8 right-8 hidden">
                    <button onclick="window.location.href='admin.html'" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 px-6 py-2 rounded-lg font-bold text-sm border border-zinc-700 flex items-center gap-2">
                        <i class="fa-solid fa-user-shield text-emerald-500"></i> PAINEL ADM
                    </button>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto mt-24 px-8">
            <div class="flex gap-8 border-b border-zinc-800 mb-8 text-sm font-bold uppercase italic tracking-tighter">
                <div class="pb-3 border-b-2 border-blue-500 text-blue-400 flex items-center gap-2">
                    <i class="fa-solid fa-receipt"></i> Meu Extrato
                </div>
            </div>

            <div class="card-bg rounded-xl p-8 shadow-2xl mb-10">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-xl font-bold italic uppercase tracking-tighter text-zinc-400">Histórico Financeiro</h3>
                    <div class="text-right">
                        <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Saldo Atual</p>
                        <h2 id="user-saldo" class="text-4xl font-black text-white italic">R$ 0</h2>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-zinc-500 text-[10px] uppercase border-b border-zinc-800 font-black tracking-widest">
                            <tr>
                                <th class="pb-4 px-4">Data</th>
                                <th class="pb-4 px-4">Tipo</th>
                                <th class="pb-4 px-4 text-center">Descrição</th>
                                <th class="pb-4 px-4 text-right">Valor Prata</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-logs" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '1255697837971214476';
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const REDIRECT_URI = 'https://1-karl.github.io/nebula-updates/index.html';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        function fazerLogin() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        }

        async function registrarNoBanco(user) {
            const avatar = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            const { data } = await supabaseClient.from('usuarios').select('*').eq('id_discord', user.id).single();
            if (!data) {
                await supabaseClient.from('usuarios').insert([{ id_discord: user.id, username: user.username, avatar_url: avatar, saldo: 0 }]);
            } else {
                await supabaseClient.from('usuarios').update({ username: user.username, avatar_url: avatar }).eq('id_discord', user.id);
            }
        }

        async function inicializar() {
            let token = localStorage.getItem('discord_token');
            if (window.location.hash.includes('access_token')) {
                token = new URLSearchParams(window.location.hash.replace('#', '?')).get('access_token');
                localStorage.setItem('discord_token', token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                if (res.ok) {
                    const user = await res.json();
                    await registrarNoBanco(user);
                    document.getElementById('tela-painel').classList.remove('hidden');
                    document.getElementById('user-name').innerText = user.username.toUpperCase();
                    document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                    
                    const { data: dbUser } = await supabaseClient.from('usuarios').select('saldo').eq('id_discord', user.id).single();
                    if (dbUser) document.getElementById('user-saldo').innerText = `R$ ${dbUser.saldo.toLocaleString('pt-BR')}`;

                    const { data: logs } = await supabaseClient.from('historico').select('*').eq('usuario_id', user.id).order('data', { ascending: false });
                    document.getElementById('tabela-logs').innerHTML = logs?.map(log => `
                        <tr class="border-b border-zinc-900/50 hover:bg-zinc-800/30 transition">
                            <td class="p-4 text-zinc-500 text-[11px] italic font-medium">${new Date(log.data).toLocaleDateString()}</td>
                            <td class="p-4"><span class="bg-emerald-950 text-emerald-400 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-tighter">↗ Entrada</span></td>
                            <td class="p-4 text-zinc-300 font-bold text-center italic">${log.descricao}</td>
                            <td class="p-4 text-right text-emerald-500 font-black text-lg italic">R$ ${log.valor_total.toLocaleString('pt-BR')}</td>
                        </tr>`).join('') || '<tr><td colspan="4" class="p-10 text-center text-zinc-600 italic">Nenhum registro.</td></tr>';

                    const { data: isAdm } = await supabaseClient.from('admins').select('*').eq('id_discord', user.id).single();
                    if (isAdm) document.getElementById('area-adm-btn').classList.remove('hidden');
                } else {
                    localStorage.removeItem('discord_token');
                    document.getElementById('tela-login').classList.remove('hidden');
                }
            } else {
                document.getElementById('tela-login').classList.remove('hidden');
            }
        }
        window.onload = inicializar;
    </script>
</body>
</html>
