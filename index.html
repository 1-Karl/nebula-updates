<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nebula Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; border-radius: 12px; }
        .banner { background: linear-gradient(90deg, #0f172a 0%, #1e3a8a 50%, #000 100%); height: 180px; border-bottom: 1px solid #1e2329; }
        .avatar { width: 130px; height: 130px; border: 4px solid #0b0e11; position: absolute; bottom: -65px; left: 30px; border-radius: 50%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="login" class="flex h-screen items-center justify-center hidden">
        <button onclick="loginDiscord()" class="bg-[#5865F2] px-8 py-4 rounded font-bold uppercase">Conectar Discord</button>
    </div>

    <div id="painel" class="hidden">
        <div class="banner relative">
            <img id="u-pic" src="" class="avatar bg-[#151921]">
            <a id="adm-btn" href="admin.html" class="absolute bottom-4 right-4 bg-zinc-800 px-4 py-2 rounded text-xs font-bold hidden">PAINEL ADM</a>
        </div>
        <div class="max-w-6xl mx-auto mt-20 px-8">
            <h1 id="u-name" class="text-4xl font-black italic uppercase">NOME...</h1>
            <div class="card-bg p-8 mt-10">
                <div class="flex justify-between items-end border-b border-zinc-800 pb-6 mb-6">
                    <span class="text-zinc-500 font-bold uppercase text-xs italic">Saldo Disponível</span>
                    <h2 id="u-saldo" class="text-5xl font-black italic text-white">R$ 0</h2>
                </div>
                <table class="w-full text-left">
                    <tbody id="u-logs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function loginDiscord() {
            const uri = "https://1-karl.github.io/nebula-updates/index.html";
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=1255697837971214476&redirect_uri=${encodeURIComponent(uri)}&response_type=token&scope=identify`;
        }

        async function carregar() {
            let tk = localStorage.getItem('tk');
            if(window.location.hash) {
                tk = new URLSearchParams(window.location.hash.replace('#','?')).get('access_token');
                localStorage.setItem('tk', tk);
                window.history.replaceState({}, "", "/index.html");
            }
            if(!tk) return document.getElementById('login').classList.remove('hidden');

            const r = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${tk}` } });
            const user = await r.json();

            if(user.id) {
                const img = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                const { data: dbUser } = await supabase.from('usuarios').upsert({ id_discord: user.id, username: user.username, avatar_url: img }).select().single();
                
                document.getElementById('painel').classList.remove('hidden');
                document.getElementById('u-name').innerText = user.username.toUpperCase();
                document.getElementById('u-pic').src = img;
                document.getElementById('u-saldo').innerText = `R$ ${dbUser.saldo.toLocaleString('pt-BR')}`;

                const { data: isAdm } = await supabase.from('admins').select('*').eq('id_discord', user.id).maybeSingle();
                if(isAdm) document.getElementById('adm-btn').classList.remove('hidden');

                const { data: logs } = await supabase.from('historico').select('*').eq('usuario_id', user.id).order('data', {ascending: false});
                document.getElementById('u-logs').innerHTML = logs.map(l => `
                    <tr class="border-b border-zinc-900">
                        <td class="py-4 text-zinc-500 italic text-[10px] uppercase font-bold">${new Date(l.data).toLocaleDateString()}</td>
                        <td class="py-4 text-emerald-500 font-black italic">R$ ${l.valor.toLocaleString('pt-BR')}</td>
                        <td class="py-4 text-right text-zinc-400 font-bold uppercase text-[10px] italic">${l.descricao}</td>
                    </tr>
                `).join('');
            }
        }
        carregar();
    </script>
</body>
</html>
