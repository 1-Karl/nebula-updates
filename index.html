<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Economia | Guilda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; }
        .btn-discord { background-color: #5865F2; transition: 0.3s; }
        .badge-entrada { background-color: #053b24; color: #10b981; }
        .hidden { display: none !important; }
        .banner-guilda { background: linear-gradient(to right, #0f172a, #1e3a8a, #000); border-bottom: 1px solid #1e2329; }
        .btn-adm { background-color: #242933; border: 1px solid #363d4a; color: #a1a7b3; transition: 0.2s; }
    </style>
</head>
<body>

    <div id="tela-login" class="flex items-center justify-center h-screen hidden">
        <div class="card-bg p-10 rounded-2xl text-center shadow-2xl max-w-sm border-t-4 border-[#5865F2]">
            <h1 class="text-2xl font-bold mb-2">Bem-vindo à Guilda</h1>
            <p class="text-gray-400 mb-8 text-sm">Conecte sua conta para acessar seu extrato.</p>
            <button onclick="fazerLogin()" class="btn-discord w-full py-3 rounded-lg font-bold flex items-center justify-center gap-3">
                <i class="fa-brands fa-discord text-xl"></i> VINCULAR DISCORD
            </button>
        </div>
    </div>

    <div id="tela-painel" class="hidden">
        <div class="banner-guilda h-44 w-full relative">
            <div class="max-w-6xl mx-auto h-full relative">
                <div class="absolute -bottom-12 left-8 flex items-end gap-6">
                    <img id="user-avatar" src="" class="w-32 h-32 rounded-full border-4 border-[#0b0e11] bg-[#151921] shadow-2xl">
                    <div class="pb-4">
                        <div class="flex items-center gap-2">
                            <h1 id="user-name" class="text-3xl font-bold italic text-white">Carregando...</h1>
                        </div>
                    </div>
                </div>
                <div class="absolute -bottom-6 right-8 hidden" id="area-adm-btn">
                    <button onclick="irParaAdm()" class="btn-adm px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-user-shield"></i> PAINEL ADM
                    </button>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto mt-20 px-8">
            <div class="card-bg rounded-xl p-8 shadow-2xl mb-10">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-xl font-bold italic">Meu Saldo</h3>
                    <div class="text-right">
                        <h2 id="user-saldo" class="text-4xl font-black text-white italic">R$ 0</h2>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <tbody id="tabela-logs" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '1255697837971214476'; 
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const REDIRECT_URI = 'https://1-karl.github.io/nebula-updates/index.html';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        function fazerLogin() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        }

        function irParaAdm() {
            window.location.href = 'admin.html' + window.location.hash;
        }

        async function inicializar() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                document.getElementById('tela-painel').classList.remove('hidden');
                const params = new URLSearchParams(hash.replace('#', '?'));
                const token = params.get('access_token');
                const userReq = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                const userData = await userReq.json();
                
                document.getElementById('user-name').innerText = userData.username;
                document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${userData.id}/${userData.avatar}.png`;

                const { data: userDb } = await supabaseClient.from('usuarios').select('saldo').eq('id_discord', userData.id).single();
                if (userDb) document.getElementById('user-saldo').innerText = `R$ ${userDb.saldo.toLocaleString('pt-BR')}`;

                const { data: isAdm } = await supabaseClient.from('admins').select('*').eq('id_discord', userData.id).single();
                if (isAdm) document.getElementById('area-adm-btn').classList.remove('hidden');
            } else {
                document.getElementById('tela-login').classList.remove('hidden');
            }
        }
        window.onload = inicializar;
    </script>
</body>
</html>
