<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula | Sistema de Economia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; border-radius: 12px; }
        .banner-gradient { background: linear-gradient(90deg, #0f172a 0%, #1e3a8a 50%, #000 100%); height: 200px; border-bottom: 1px solid #1e2329; }
        .avatar-frame { width: 140px; height: 140px; border: 4px solid #0b0e11; position: absolute; bottom: -70px; left: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .badge-status { background: #1e2329; border: 1px solid #2d333b; color: #5865F2; padding: 2px 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 4px; }
        .badge-guilda { background: #053b24; color: #10b981; font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="flex items-center justify-center h-screen hidden">
        <div class="card-bg p-10 text-center border-t-4 border-[#5865F2] shadow-2xl">
            <h1 class="text-3xl font-black italic mb-8">NEBULA ECONOMY</h1>
            <button onclick="login()" class="bg-[#5865F2] px-10 py-4 rounded-lg font-black flex items-center gap-3 hover:opacity-90">
                <i class="fa-brands fa-discord"></i> VINCULAR DISCORD
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="banner-gradient relative">
            <div class="max-w-6xl mx-auto h-full relative">
                <img id="u-avatar" src="" class="avatar-frame rounded-full bg-[#151921]">
                <div id="admin-area" class="absolute -bottom-10 right-8 hidden">
                    <a href="admin.html" class="bg-[#1a1f26] border border-[#2d333b] text-zinc-400 px-5 py-2 rounded-lg font-black text-xs hover:text-white flex items-center gap-2 transition">
                        <i class="fa-solid fa-user-shield text-emerald-500"></i> PAINEL ADM
                    </a>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto mt-24 px-10">
            <div class="mb-10">
                <div class="flex items-center gap-3">
                    <h1 id="u-name" class="text-4xl font-black italic uppercase text-white tracking-tighter">CARREGANDO...</h1>
                    <span class="badge-status">Membro</span>
                </div>
                <span class="badge-guilda italic inline-block mt-2">Membro da Guilda</span>
            </div>

            <div class="card-bg p-8">
                <div class="flex justify-between items-center border-b border-zinc-800 pb-6 mb-6">
                    <h3 class="text-zinc-500 font-black uppercase text-[11px] italic tracking-widest">Extrato de Pratas</h3>
                    <div class="text-right">
                        <span class="text-[10px] font-black text-zinc-500 uppercase">Patrimônio</span>
                        <h2 id="u-saldo" class="text-5xl font-black italic text-white">R$ 0</h2>
                    </div>
                </div>
                <table class="w-full">
                    <tbody id="u-logs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        function login() {
            const REDIRECT = 'https://1-karl.github.io/nebula-updates/index.html';
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=1255697837971214476&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`;
        }

        async function init() {
            let token = localStorage.getItem('access_token');
            if(window.location.hash) {
                token = new URLSearchParams(window.location.hash.replace('#','?')).get('access_token');
                localStorage.setItem('access_token', token);
                window.history.replaceState({}, "", window.location.pathname);
            }
            if(!token) return document.getElementById('login-screen').classList.remove('hidden');

            const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
            const user = await res.json();

            if(user.id) {
                const pic = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                const { data: db } = await supabaseClient.from('usuarios').upsert({ id_discord: user.id, username: user.username, avatar_url: pic }).select().single();
                
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('u-name').innerText = user.username;
                document.getElementById('u-avatar').src = pic;
                document.getElementById('u-saldo').innerText = `R$ ${db.saldo.toLocaleString('pt-BR')}`;

                // VERIFICAÇÃO ADM MELHORADA
                const { data: isAdm } = await supabaseClient.from('admins').select('*').eq('id_discord', user.id).maybeSingle();
                if(isAdm) document.getElementById('admin-area').classList.remove('hidden');

                const { data: logs } = await supabaseClient.from('historico').select('*').eq('usuario_id', user.id).order('data', {ascending: false});
                document.getElementById('u-logs').innerHTML = logs.map(l => `
                    <tr class="border-b border-zinc-900/50">
                        <td class="py-4 text-zinc-500 font-bold italic text-[10px]">${new Date(l.data).toLocaleDateString()}</td>
                        <td class="py-4"><span class="badge-guilda px-2 py-1 rounded">↗ Entrada</span></td>
                        <td class="py-4 text-center text-zinc-400 font-black italic uppercase text-xs">${l.descricao}</td>
                        <td class="py-4 text-right text-emerald-500 font-black italic text-lg">R$ ${l.valor_total.toLocaleString('pt-BR')}</td>
                    </tr>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
