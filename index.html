<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula | Início</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; border-radius: 12px; }
        .btn-discord { background-color: #5865F2; transition: 0.3s; font-weight: bold; }
        .banner-perfil { background: linear-gradient(to bottom, #1e3a8a, #0b0e11); height: 180px; border-bottom: 1px solid #1e2329; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="tela-login" class="flex items-center justify-center h-screen hidden">
        <div class="card-bg p-10 text-center shadow-2xl max-w-sm border-t-4 border-[#5865F2]">
            <h1 class="text-2xl font-black italic mb-6">NEBULA ECONOMY</h1>
            <button onclick="fazerLogin()" class="btn-discord w-full py-4 rounded-lg flex items-center justify-center gap-3">
                <i class="fa-brands fa-discord text-xl"></i> VINCULAR DISCORD
            </button>
        </div>
    </div>

    <div id="tela-painel" class="hidden">
        <div class="banner-perfil relative">
            <div class="max-w-6xl mx-auto h-full relative px-8">
                <div class="absolute -bottom-14 flex items-end gap-6">
                    <img id="user-avatar" src="" class="w-32 h-32 rounded-full border-4 border-[#0b0e11] bg-[#151921]">
                    <div class="pb-4">
                        <h1 id="user-name" class="text-3xl font-black italic text-white uppercase">CARREGANDO...</h1>
                    </div>
                </div>
                <div id="area-adm-btn" class="absolute -bottom-8 right-8 hidden">
                    <a href="admin.html" class="bg-zinc-800 text-zinc-400 px-6 py-2 rounded-lg font-bold text-sm border border-zinc-700 flex items-center gap-2">
                        <i class="fa-solid fa-user-shield text-emerald-500"></i> PAINEL ADM
                    </a>
                </div>
            </div>
        </div>
        <div class="max-w-6xl mx-auto mt-24 px-8">
            <div class="card-bg p-8 mb-10">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-bold italic text-zinc-500 uppercase">Meu Saldo</h3>
                    <h2 id="user-saldo" class="text-4xl font-black text-white italic">R$ 0</h2>
                </div>
                <table class="w-full text-left"><tbody id="tabela-logs"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        function fazerLogin() {
            const REDIRECT = 'https://1-karl.github.io/nebula-updates/index.html';
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=1255697837971214476&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`;
        }

        async function inicializar() {
            let token = localStorage.getItem('discord_token');
            if (window.location.hash.includes('access_token')) {
                token = new URLSearchParams(window.location.hash.replace('#', '?')).get('access_token');
                localStorage.setItem('discord_token', token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                if (res.ok) {
                    const user = await res.json();
                    const avatar = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                    
                    // REGISTRA NO BANCO (CRUCIAL PARA A BUSCA FUNCIONAR)
                    const { data: dbUser } = await supabaseClient.from('usuarios').upsert({ 
                        id_discord: user.id, username: user.username, avatar_url: avatar 
                    }, { onConflict: 'id_discord' }).select().single();

                    document.getElementById('tela-painel').classList.remove('hidden');
                    document.getElementById('user-name').innerText = user.username.toUpperCase();
                    document.getElementById('user-avatar').src = avatar;
                    document.getElementById('user-saldo').innerText = `R$ ${(dbUser?.saldo || 0).toLocaleString('pt-BR')}`;

                    const { data: isAdm } = await supabaseClient.from('admins').select('*').eq('id_discord', user.id).single();
                    if (isAdm) document.getElementById('area-adm-btn').classList.remove('hidden');
                } else { localStorage.removeItem('discord_token'); location.reload(); }
            } else { document.getElementById('tela-login').classList.remove('hidden'); }
        }
        window.onload = inicializar;
    </script>
</body>
</html>
