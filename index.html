<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Economia | Guilda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; }
        .btn-discord { background-color: #5865F2; transition: 0.3s; }
        .badge-entrada { background-color: #053b24; color: #10b981; }
        .hidden { display: none !important; }
        .banner-guilda { background: linear-gradient(to right, #0f172a, #1e3a8a, #000); border-bottom: 1px solid #1e2329; }
        .btn-adm { background-color: #242933; border: 1px solid #363d4a; color: #a1a7b3; hover:bg-[#2d333b]; transition: 0.2s; }
    </style>
</head>
<body>

    <div id="tela-login" class="flex items-center justify-center h-screen hidden">
        <div class="card-bg p-10 rounded-2xl text-center shadow-2xl max-w-sm border-t-4 border-[#5865F2]">
            <img src="https://assets-global.website-files.com/6257adef93867e35d8a0c43f/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" class="w-16 mx-auto mb-6">
            <h1 class="text-2xl font-bold mb-2">Bem-vindo à Guilda</h1>
            <p class="text-gray-400 mb-8 text-sm">Conecte sua conta para acessar seu extrato financeiro.</p>
            <button onclick="fazerLogin()" class="btn-discord w-full py-3 rounded-lg font-bold flex items-center justify-center gap-3 shadow-lg">
                <i class="fa-brands fa-discord text-xl"></i> VINCULAR DISCORD
            </button>
        </div>
    </div>

    <div id="tela-painel" class="hidden">
        <div class="banner-guilda h-44 w-full relative">
            <div class="max-w-6xl mx-auto h-full relative">
                <div class="absolute -bottom-12 left-8 flex items-end gap-6">
                    <img id="user-avatar" src="" class="w-32 h-32 rounded-full border-4 border-[#0b0e11] bg-[#151921] shadow-2xl">
                    <div class="pb-4">
                        <div class="flex items-center gap-2">
                            <h1 id="user-name" class="text-3xl font-bold italic text-white tracking-tight">Carregando...</h1>
                            <span class="bg-[#1e2329] text-[#7289da] px-2 py-0.5 rounded text-[10px] font-bold uppercase border border-[#2d333b]">Player</span>
                        </div>
                        <div class="flex items-center gap-3 mt-1">
                            <span class="text-[#10b981] bg-[#053b24] px-2 py-0.5 rounded text-[10px] font-bold flex items-center gap-1">
                                <i class="fa-solid fa-shield-halved text-[8px]"></i> Membro da Guilda
                            </span>
                        </div>
                    </div>
                </div>
                <div class="absolute -bottom-6 right-8 hidden" id="area-adm-btn">
                    <button onclick="irParaAdm()" class="btn-adm px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 shadow-lg text-sm italic">
                        <i class="fa-solid fa-user-shield"></i> PAINEL ADM
                    </button>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto mt-16 px-8">
            <div class="flex gap-10 border-b border-gray-800 mb-8 text-gray-500 font-bold text-sm">
                <div class="pb-3 border-b-2 border-blue-500 text-blue-400 cursor-pointer flex items-center gap-2 uppercase tracking-tighter">
                    <i class="fa-solid fa-receipt"></i> Meu Extrato
                </div>
            </div>

            <div class="card-bg rounded-xl p-8 shadow-2xl mb-10">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-xl font-bold italic flex items-center gap-3">
                        <i class="fa-solid fa-circle-info text-gray-600"></i> Histórico Financeiro
                    </h3>
                    <div class="text-right">
                        <p class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">Saldo Disponível</p>
                        <h2 id="user-saldo" class="text-4xl font-black text-white italic">R$ 0</h2>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-gray-500 text-[10px] uppercase border-b border-gray-800 font-black tracking-widest">
                            <tr>
                                <th class="pb-4 px-4">Data</th>
                                <th class="pb-4 px-4">Tipo</th>
                                <th class="pb-4 px-4 text-center">Descrição / Origem</th>
                                <th class="pb-4 px-4 text-right">Valor Prata</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-logs" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '1255697837971214476'; 
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        function fazerLogin() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        }

        function irParaAdm() {
            window.location.href = 'admin.html' + window.location.hash;
        }

        async function inicializar() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                document.getElementById('tela-painel').classList.remove('hidden');
                const params = new URLSearchParams(hash.replace('#', '?'));
                const token = params.get('access_token');
                try {
                    const userReq = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                    const userData = await userReq.json();
                    carregarPainel(userData);
                } catch (e) { document.getElementById('tela-login').classList.remove('hidden'); }
            } else { document.getElementById('tela-login').classList.remove('hidden'); }
        }

        async function carregarPainel(discordUser) {
            document.getElementById('user-name').innerText = discordUser.username;
            document.getElementById('user-avatar').src = discordUser.avatar ? `https://cdn.discordapp.com/avatars/${discordUser.id}/${discordUser.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';

            const { data: userDb } = await supabaseClient.from('usuarios').select('*').eq('id_discord', discordUser.id).single();
            if (userDb) { document.getElementById('user-saldo').innerText = `R$ ${userDb.saldo.toLocaleString('pt-BR')}`; }

            const { data: logs } = await supabaseClient.from('historico').select('*').eq('usuario_id', discordUser.id).order('data', { ascending: false });
            document.getElementById('tabela-logs').innerHTML = logs?.map(log => `
                <tr class="border-b border-[#1e2329] hover:bg-[#1a1f26] transition">
                    <td class="p-4 text-gray-500 text-[11px] font-medium italic">${new Date(log.data).toLocaleDateString()}</td>
                    <td class="p-4"><span class="badge-entrada px-2 py-1 rounded text-[10px] font-black uppercase">↗ Entrada</span></td>
                    <td class="p-4 text-gray-300 font-semibold text-center">${log.descricao}</td>
                    <td class="p-4 text-right text-[#10b981] font-black text-lg italic">R$ ${log.valor_total.toLocaleString('pt-BR')}</td>
                </tr>`).join('') || '<tr><td colspan="4" class="p-10 text-center">Nenhum registro.</td></tr>';

            const { data: isAdm } = await supabaseClient.from('admins').select('*').eq('id_discord', discordUser.id).single();
            if (isAdm) document.getElementById('area-adm-btn').classList.remove('hidden');
        }
        window.onload = inicializar;
    </script>
</body>
</html>
