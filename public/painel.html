<!DOCTYPE html>
<html lang="pt-br">
<head><script src="https://cdn.tailwindcss.com"></script><title>Meu Extrato</title></head>
<body class="bg-[#0f0f11] text-white p-4 font-sans">
    <div class="max-w-5xl mx-auto mt-10">
        <div class="bg-[#16171a] p-8 rounded-t-2xl border-b border-gray-800 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img id="uAvatar" class="w-16 h-16 rounded-full border-2 border-purple-500 shadow-lg" src="">
                <div><h1 id="uNome" class="text-2xl font-bold italic italic tracking-tighter">Carregando...</h1><span class="bg-green-500/10 text-green-500 px-3 py-1 rounded text-[10px] font-bold uppercase tracking-widest">Membro da Guilda</span></div>
            </div>
            <div class="text-right">
                <p class="text-gray-500 text-xs font-bold uppercase mb-1">Saldo Disponível</p>
                <p id="uSaldo" class="text-4xl font-black text-green-400 leading-none">R$ 0,00</p>
            </div>
        </div>
        <div class="bg-[#16171a] p-8 rounded-b-2xl shadow-2xl">
            <h2 class="text-sm font-bold text-gray-400 uppercase mb-6 italic">ℹ Histórico Financeiro</h2>
            <table class="w-full text-left">
                <thead class="text-gray-600 text-[10px] uppercase border-b border-gray-800">
                    <tr><th class="pb-4">DATA</th><th class="pb-4">TIPO</th><th class="pb-4">DESCRIÇÃO</th><th class="pb-4 text-right">VALOR</th></tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        async function carregar() {
            const r = await fetch(`/api/user/${id}`);
            const d = await r.json();
            document.getElementById('uAvatar').src = d.perfil.avatar;
            document.getElementById('uNome').innerText = d.perfil.username;
            document.getElementById('uSaldo').innerText = d.perfil.saldo.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('tabela').innerHTML = d.transacoes.map(t => `
                <tr class="border-b border-gray-800/50 text-sm hover:bg-white/5 transition">
                    <td class="py-4 text-gray-500">${new Date(t.data).toLocaleDateString()}</td>
                    <td class="py-4"><span class="px-2 py-1 rounded text-[10px] font-bold ${t.tipo==='Entrada'?'bg-green-500/10 text-green-500':'bg-red-500/10 text-red-500'}">${t.tipo==='Entrada'?'↗ Entrada':'↘ Saída'}</span></td>
                    <td class="py-4 font-bold">${t.descricao}<br><span class="text-[10px] text-gray-500">Por: ${t.responsavel}</span></td>
                    <td class="py-4 text-right font-bold ${t.tipo==='Entrada'?'text-green-400':'text-red-400'}">${t.valor.toLocaleString('pt-BR')}</td>
                </tr>`).join('');
        }
        carregar();
    </script>
</body>
</html>
