<!DOCTYPE html>
<html lang="pt-br">
<head><script src="https://cdn.tailwindcss.com"></script><title>Admin - Transferir</title></head>
<body class="bg-[#0f0f11] flex items-center justify-center min-h-screen">
    <div class="bg-[#1a1b1e] w-full max-w-md rounded-2xl border border-gray-800 p-8 shadow-2xl">
        <h2 class="text-2xl font-black text-white mb-6 italic">Transferir</h2>
        <div class="space-y-4">
            <input type="text" id="tId" placeholder="ID Discord do Usuário" class="w-full bg-[#0f0f11] border-2 border-gray-800 rounded-xl p-4 text-white focus:border-green-500 outline-none">
            <input type="number" id="tVal" placeholder="Valor" class="w-full bg-[#0f0f11] border-2 border-gray-800 rounded-xl p-4 text-white focus:border-green-500 outline-none">
            <div class="grid grid-cols-1 gap-2">
                <button onclick="enviar('DEPOSITAR')" class="bg-green-600 hover:bg-green-500 p-4 rounded-xl font-bold transition-all">DEPOSITAR</button>
                <button onclick="enviar('RETIRAR')" class="bg-red-600 hover:bg-red-500 p-4 rounded-xl font-bold text-white transition-all">RETIRAR</button>
                <button onclick="enviar('PAGAR')" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold text-white transition-all">PAGAR (SUBTRAIR TUDO)</button>
            </div>
        </div>
    </div>
    <script>
        async function enviar(acao) {
            const body = { targetId: document.getElementById('tId').value, valor: document.getElementById('tVal').value, acao, adminNome: "Admin Principal" };
            const r = await fetch('/api/admin/ajustar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            const res = await r.json();
            alert(res.success ? "Sucesso! Saldo atualizado." : "Erro! Usuário não encontrado.");
        }
    </script>
</body>
</html>
