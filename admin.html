<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM | Nebula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .input { background: #1a1f26; border: 1px solid #2d333b; color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
        .list { background: #1a1f26; border: 1px solid #2d333b; border-radius: 8px; margin-top: 5px; position: absolute; width: 100%; z-index: 100; }
        .item { padding: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #0b0e11; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black italic uppercase mb-8">Gerenciar Saldo</h1>
        <div class="relative mb-6">
            <input type="text" id="busca" class="input" placeholder="Nome do jogador..." autocomplete="off">
            <div id="res" class="list hidden"></div>
        </div>
        <input type="number" id="valor" class="input mb-6" placeholder="Quantia">
        <button onclick="enviar()" class="w-full bg-emerald-600 py-4 rounded font-black italic uppercase">Confirmar</button>
        <a href="index.html" class="block text-center mt-6 text-zinc-500 text-xs">Voltar</a>
    </div>

    <script>
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        let selId = "";

        document.getElementById('busca').addEventListener('input', async (e) => {
            const t = e.target.value;
            if(t.length < 2) return;
            const { data } = await supabase.from('usuarios').select('*').ilike('username', `%${t}%`);
            const box = document.getElementById('res');
            box.innerHTML = data.map(u => `<div class="item" onclick="set('${u.username}','${u.id_discord}')"><img src="${u.avatar_url}" class="w-8 h-8 rounded-full"><b>${u.username}</b></div>`).join('');
            box.classList.remove('hidden');
        });

        function set(n, id) {
            document.getElementById('busca').value = n;
            selId = id;
            document.getElementById('res').classList.add('hidden');
        }

        async function enviar() {
            const v = parseInt(document.getElementById('valor').value);
            if(!selId || !v) return alert("Erro!");
            const { data: u } = await supabase.from('usuarios').select('saldo').eq('id_discord', selId).single();
            await supabase.from('usuarios').update({ saldo: u.saldo + v }).eq('id_discord', selId);
            await supabase.from('historico').insert({ usuario_id: selId, valor: v, descricao: "Crédito ADM" });
            alert("Enviado!"); location.reload();
        }
    </script>
</body>
</html>
