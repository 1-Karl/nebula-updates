<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nebula | Administração</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; border-radius: 12px; }
        .input-dark { background-color: #1a1f26; border: 1px solid #2d333b; color: white; padding: 12px; width: 100%; border-radius: 8px; outline: none; }
        .results-box { position: absolute; width: 100%; background: #1a1f26; border: 1px solid #2d333b; border-radius: 8px; z-index: 50; margin-top: 5px; }
        .user-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-item:hover { background: #242a33; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black italic uppercase mb-8 border-l-4 border-emerald-500 pl-4">Transferir Pratas</h1>
        <div class="card-bg p-8">
            <div class="space-y-6">
                <div class="relative">
                    <label class="text-[10px] font-black text-zinc-500 uppercase mb-2 block">Membro do Discord</label>
                    <input type="text" id="search" class="input-dark" placeholder="Pesquisar nome..." autocomplete="off">
                    <input type="hidden" id="target-id">
                    <div id="results" class="results-box hidden"></div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase mb-2 block">Valor</label>
                    <input type="number" id="amount" class="input-dark font-mono text-emerald-500 text-xl" placeholder="0">
                </div>
                <button onclick="send()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-lg font-black italic uppercase">Confirmar Envio</button>
            </div>
        </div>
        <a href="index.html" class="block text-center mt-6 text-zinc-600 font-bold text-xs uppercase">← Voltar</a>
    </div>

    <script>
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('search').addEventListener('input', async (e) => {
            const term = e.target.value;
            if(term.length < 2) return;
            const { data } = await supabaseClient.from('usuarios').select('*').ilike('username', `%${term}%`).limit(5);
            const box = document.getElementById('results');
            box.innerHTML = data.map(u => `<div class="user-item" onclick="selectUser('${u.username}','${u.id_discord}')"><img src="${u.avatar_url}" class="w-8 h-8 rounded-full"> <span class="font-bold text-sm uppercase italic">${u.username}</span></div>`).join('');
            box.classList.remove('hidden');
        });

        function selectUser(name, id) {
            document.getElementById('search').value = name.toUpperCase();
            document.getElementById('target-id').value = id;
            document.getElementById('results').classList.add('hidden');
        }

        async function send() {
            const id = document.getElementById('target-id').value;
            const val = parseInt(document.getElementById('amount').value);
            if(!id || !val) return alert("Selecione o usuário e o valor!");

            const { data: u } = await supabaseClient.from('usuarios').select('saldo').eq('id_discord', id).single();
            await supabaseClient.from('usuarios').update({ saldo: (u.saldo || 0) + val }).eq('id_discord', id);
            await supabaseClient.from('historico').insert([{ usuario_id: id, tipo: 'entrada', descricao: 'ENVIO ADMINISTRATIVO', valor_total: val }]);
            alert("Sucesso!"); location.reload();
        }
    </script>
</body>
</html>
