<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM | Nebula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; }
        .input-dark { background-color: #1a1f26; border: 1px solid #2d333b; border-radius: 8px; color: white; padding: 12px; width: 100%; outline: none; }
        .btn-acao { background-color: #053b24; color: #10b981; border: 1px solid #10b981; transition: 0.2s; }
        .btn-acao:hover { background-color: #10b981; color: white; }
        .tab-ativa { border-bottom: 2px solid #10b981; color: #10b981; }
        .autocomplete-results { position: absolute; top: 100%; left: 0; right: 0; background-color: #1a1f26; border: 1px solid #2d333b; border-radius: 8px; z-index: 50; max-height: 200px; overflow-y: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <div id="tela-negado" class="flex flex-col items-center justify-center h-screen hidden">
        <h1 class="text-2xl font-bold text-red-500 uppercase">Acesso Não Autorizado</h1>
    </div>

    <div id="tela-adm" class="max-w-5xl mx-auto hidden">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter italic">
                <i class="fa-solid fa-user-shield text-emerald-500 mr-2"></i> Administração
            </h1>
            <div id="tag-cargo" class="px-4 py-1 rounded bg-zinc-800 border border-zinc-700 text-[10px] font-black uppercase">Carregando...</div>
        </div>

        <div class="flex gap-8 border-b border-zinc-800 mb-8 font-bold text-sm uppercase italic">
            <button onclick="trocarAba('pagamentos')" id="tab-pagamentos" class="tab-ativa pb-4 flex items-center gap-2">
                <i class="fa-solid fa-money-bill-transfer"></i> Financeiro
            </button>
            <button onclick="trocarAba('equipe')" id="tab-equipe" class="text-zinc-500 pb-4 flex items-center gap-2">
                <i class="fa-solid fa-users-gear"></i> Equipe
            </button>
        </div>

        <div id="aba-pagamentos">
            <div class="card-bg p-8 rounded-xl relative shadow-2xl border-t-2 border-emerald-500">
                <h3 class="mb-6 font-bold italic">Gerenciar Saldo de Players</h3>
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="relative">
                        <label class="text-[10px] uppercase font-bold text-zinc-500 mb-2 block">Buscar Player</label>
                        <input type="text" id="destinatario-input" class="input-dark" placeholder="Nome ou ID...">
                        <input type="hidden" id="destinatario-id-oculto">
                        <div id="lista-autocomplete" class="autocomplete-results hidden"></div>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 mb-2 block">Quantia (Prata)</label>
                        <input type="number" id="quantia-input" class="input-dark font-mono" placeholder="Ex: 1000 ou -1000">
                    </div>
                </div>
                <button onclick="executarPagamento()" class="btn-acao w-full mt-8 py-4 rounded-lg font-black uppercase italic tracking-widest shadow-lg">
                    Confirmar Transação
                </button>
            </div>
        </div>

        <div id="aba-equipe" class="hidden">
            <div class="card-bg p-8 rounded-xl border-t-2 border-blue-500">
                <h3 class="mb-6 font-bold italic text-blue-400">Lista de Administradores</h3>
                <div id="lista-admins-grid" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function verificarAcesso() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                const token = params.get('access_token');
                const userReq = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                const userData = await userReq.json();
                
                const { data: adm } = await supabaseClient.from('admins').select('*').eq('id_discord', userData.id).single();
                
                if (adm) {
                    document.getElementById('tela-adm').classList.remove('hidden');
                    document.getElementById('tag-cargo').innerText = adm.cargo || 'ADMIN';
                    configurarBusca();
                    carregarEquipe();
                } else {
                    document.getElementById('tela-negado').classList.remove('hidden');
                }
            } else {
                document.getElementById('tela-negado').classList.remove('hidden');
            }
        }

        function trocarAba(aba) {
            document.getElementById('aba-pagamentos').classList.add('hidden');
            document.getElementById('aba-equipe').classList.add('hidden');
            document.getElementById('tab-pagamentos').className = 'text-zinc-500 pb-4';
            document.getElementById('tab-equipe').className = 'text-zinc-500 pb-4';

            document.getElementById('aba-' + aba).classList.remove('hidden');
            document.getElementById('tab-' + aba).className = 'tab-ativa pb-4 flex items-center gap-2';
        }

        function configurarBusca() {
            const input = document.getElementById('destinatario-input');
            const lista = document.getElementById('lista-autocomplete');
            input.addEventListener('input', async () => {
                const termo = input.value.trim();
                if (termo.length < 2) return lista.classList.add('hidden');
                const { data: usuarios } = await supabaseClient.rpc('buscar_usuarios', { termo: termo });
                if (usuarios?.length > 0) {
                    lista.innerHTML = usuarios.map(u => `
                        <div class="p-3 border-b border-zinc-800 cursor-pointer hover:bg-zinc-800 flex items-center gap-3" onclick="selecionar('${u.username}', '${u.id_discord}')">
                            <span class="font-bold text-sm">${u.username}</span>
                            <span class="text-[9px] text-zinc-500 font-mono">${u.id_discord}</span>
                        </div>`).join('');
                    lista.classList.remove('hidden');
                }
            });
        }

        function selecionar(nome, id) {
            document.getElementById('destinatario-input').value = nome;
            document.getElementById('destinatario-id-oculto').value = id;
            document.getElementById('lista-autocomplete').classList.add('hidden');
        }

        async function executarPagamento() {
            const id = document.getElementById('destinatario-id-oculto').value;
            const valor = parseInt(document.getElementById('quantia-input').value);
            if (!id || isNaN(valor)) return alert("Selecione um player e o valor!");

            const { data: player } = await supabaseClient.from('usuarios').select('saldo').eq('id_discord', id).single();
            const novoSaldo = (player?.saldo || 0) + valor;

            await supabaseClient.from('usuarios').upsert({ id_discord: id, saldo: novoSaldo }, { onConflict: 'id_discord' });
            await supabaseClient.from('historico').insert([{ 
                usuario_id: id, 
                tipo: valor >= 0 ? 'entrada' : 'saída', 
                descricao: 'Ajuste Manual ADM', 
                valor_total: Math.abs(valor), 
                data: new Date() 
            }]);
            
            alert("✅ Transação Realizada!");
            document.getElementById('quantia-input').value = "";
        }

        async function carregarEquipe() {
            const { data: lista } = await supabaseClient.from('admins').select('*');
            document.getElementById('lista-admins-grid').innerHTML = lista.map(a => `
                <div class="p-3 bg-zinc-900 rounded border border-zinc-800 flex justify-between">
                    <span class="font-mono text-xs">${a.id_discord}</span>
                    <span class="text-[9px] font-bold text-emerald-500 uppercase">${a.cargo || 'MOD'}</span>
                </div>`).join('');
        }

        window.onload = verificarAcesso;
    </script>
</body>
</html>
