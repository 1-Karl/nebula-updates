<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula | Administração</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .card-bg { background-color: #151921; border: 1px solid #1e2329; border-radius: 12px; }
        .input-dark { background-color: #1a1f26; border: 1px solid #2d333b; color: white; padding: 14px; width: 100%; border-radius: 8px; outline: none; }
        .autocomplete-results { position: absolute; top: 100%; left: 0; right: 0; background-color: #1a1f26; border: 1px solid #2d333b; border-radius: 8px; z-index: 100; max-height: 250px; overflow-y: auto; }
        .hidden { display: none !important; }
        .btn-enviar { background-color: #008f44; color: white; font-weight: bold; padding: 14px; width: 100%; border-radius: 8px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-xl mx-auto mt-10">
        <h1 class="text-2xl font-black italic uppercase mb-8 flex items-center gap-3">
            <i class="fa-solid fa-money-bill-transfer text-emerald-500"></i> Administração de Saldo
        </h1>

        <div class="card-bg p-8 shadow-2xl">
            <div class="space-y-6">
                <div class="relative">
                    <label class="text-[10px] uppercase font-black text-zinc-500 mb-2 block tracking-widest">Pesquisar Jogador (Nome do Discord)</label>
                    <input type="text" id="busca-input" class="input-dark font-bold" placeholder="Digite para buscar..." autocomplete="off">
                    <input type="hidden" id="id-selecionado">
                    <div id="lista-busca" class="autocomplete-results hidden"></div>
                </div>

                <div>
                    <label class="text-[10px] uppercase font-black text-zinc-500 mb-2 block tracking-widest">Valor da Prata</label>
                    <input type="number" id="valor-input" class="input-dark font-mono text-xl text-emerald-500" placeholder="0">
                </div>

                <button onclick="confirmarEnvio()" class="btn-enviar uppercase italic tracking-tighter">Confirmar Transferência</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://mrzlwrlufgqbsapsidjy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemx3cmx1ZmdxYnNhcHNpZGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc5MzMsImV4cCI6MjA5MDYyMzkzM30.6vH3KfWU1XJqRrCi6e___LNt-t1nZzQpfe6EumzvkmI';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // BUSCA EM TEMPO REAL USANDO A FUNÇÃO RPC
        document.getElementById('busca-input').addEventListener('input', async (e) => {
            const termo = e.target.value.trim();
            const lista = document.getElementById('lista-busca');

            if (termo.length < 2) return lista.classList.add('hidden');

            // CHAMA A FUNÇÃO SQL QUE CRIAMOS
            const { data: usuarios, error } = await supabaseClient.rpc('buscar_usuarios_v2', { termo_busca: termo });

            if (usuarios && usuarios.length > 0) {
                lista.innerHTML = usuarios.map(u => `
                    <div onclick="selecionar('${u.username}', '${u.id_discord}')" class="p-4 hover:bg-[#242933] cursor-pointer flex items-center gap-4 border-b border-[#1e2329]">
                        <img src="${u.avatar_url}" class="w-10 h-10 rounded-full border border-zinc-700">
                        <div class="flex flex-col">
                            <span class="font-bold text-white uppercase italic text-sm">${u.username}</span>
                            <small class="text-zinc-500 font-mono text-[9px]">${u.id_discord}</small>
                        </div>
                    </div>`).join('');
                lista.classList.remove('hidden');
            } else {
                lista.classList.add('hidden');
            }
        });

        function selecionar(nome, id) {
            document.getElementById('busca-input').value = nome.toUpperCase();
            document.getElementById('id-selecionado').value = id;
            document.getElementById('lista-busca').classList.add('hidden');
        }

        async function confirmarEnvio() {
            const idDestino = document.getElementById('id-selecionado').value;
            const valor = parseInt(document.getElementById('valor-input').value);

            if (!idDestino || isNaN(valor) || valor <= 0) return alert("Selecione um jogador e um valor!");

            // BUSCA SALDO ATUAL E ATUALIZA
            const { data: user } = await supabaseClient.from('usuarios').select('saldo').eq('id_discord', idDestino).single();
            const novoSaldo = (user?.saldo || 0) + valor;

            const { error: updError } = await supabaseClient.from('usuarios').update({ saldo: novoSaldo }).eq('id_discord', idDestino);
            
            if (!updError) {
                await supabaseClient.from('historico').insert([{ 
                    usuario_id: idDestino, tipo: 'entrada', descricao: 'TRANSFERÊNCIA ADM', valor_total: valor, data: new Date() 
                }]);
                alert("✅ Sucesso! Saldo atualizado.");
                location.reload();
            } else {
                alert("Erro ao atualizar banco. Verifique o SQL e as políticas RLS.");
            }
        }
    </script>
</body>
</html>
